name: Build & Release

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [main, master]
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: pathmaker-linux-x86_64
            binary: pathmaker
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: pathmaker-windows-x86_64
            binary: pathmaker.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: pathmaker-macos-aarch64
            binary: pathmaker

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # vcpkg compiles SDL2 + SDL2_ttf from source so it needs cmake and
      # a C compiler. On Linux we also need the X11/audio headers that SDL2
      # depends on at compile time even when building statically.
      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential pkg-config \
            libx11-dev libxext-dev libxi-dev libxrandr-dev libxss-dev \
            libasound2-dev libpulse-dev

      - name: Install macOS build tools
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install Windows build tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y

      # --- Rust toolchain ---
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-vcpkg
        run: cargo install cargo-vcpkg

      # Cache both cargo registry and the vcpkg build output.
      # vcpkg compiles from source so this saves several minutes per run.
      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/vcpkg
          key: vcpkg-${{ matrix.target }}-${{ hashFiles('Cargo.toml') }}
          restore-keys: vcpkg-${{ matrix.target }}-

      # Reads [package.metadata.vcpkg] in Cargo.toml to know what to build
      # and which triplet to use per platform.
      - name: Build vcpkg dependencies
        run: cargo vcpkg --verbose build --target ${{ matrix.target }} 

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # --features ci-static enables use-vcpkg (defined in Cargo.toml [features])
      # which tells sdl2-sys to use the vcpkg output instead of pkg-config.
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --features ci-static

      # --- Package binary ---
      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} staging/
          cp -r src/assets staging/ 2>/dev/null || true
          cd staging && tar czf ../${{ matrix.artifact }}.tar.gz *

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" staging/
          if (Test-Path "src/assets") { Copy-Item -Recurse "src/assets" staging/ }
          Compress-Archive -Path staging/* -DestinationPath "${{ matrix.artifact }}.zip"

      # --- Upload artifact ---
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: ignore

  # --- Create a GitHub Release when a tag is pushed ---
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip