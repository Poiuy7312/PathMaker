name: Build & Release

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [main, master]
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: pathmaker-linux-x86_64
            binary: pathmaker
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: pathmaker-windows-x86_64
            binary: pathmaker.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: pathmaker-macos-aarch64
            binary: pathmaker

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Set VCPKG_ROOT as early as possible so it is available for every
      # subsequent step including the rust-cache and cargo build steps.
      # Windows: cargo-vcpkg uses the pre-installed vcpkg at C:\vcpkg
      # Linux/macOS: cargo-vcpkg builds into target/vcpkg
      - name: Set VCPKG_ROOT (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV

      - name: Set VCPKG_ROOT (Unix)
        if: runner.os != 'Windows'
        run: echo "VCPKG_ROOT=${{ github.workspace }}/target/vcpkg" >> $GITHUB_ENV

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential pkg-config curl zip unzip tar \
            autoconf autoconf-archive automake libtool libltdl-dev \
            libx11-dev libxext-dev libxi-dev libxrandr-dev libxss-dev \
            libasound2-dev libpulse-dev \
            libdbus-1-dev libsystemd-dev libwayland-dev wayland-protocols \
            libxkbcommon-dev libegl1-mesa-dev libgles2-mesa-dev

      # VCPKG_FORCE_SYSTEM_BINARIES tells vcpkg to use Homebrew's cmake/ninja
      # rather than downloading its own, avoiding ARM64 architecture mismatches.
      # Also remove the system vcpkg so sdl2-sys doesn't find it before target/vcpkg.
      - name: Install macOS build tools
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja pkg-config
          echo "VCPKG_FORCE_SYSTEM_BINARIES=1" >> $GITHUB_ENV
          sudo rm -rf /usr/local/share/vcpkg /usr/local/bin/vcpkg

      - name: Install Windows build tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y

      # --- Rust toolchain ---
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Rust cache goes before cargo-vcpkg so cached build scripts are compiled
      # with VCPKG_ROOT already set in the environment.
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cargo-vcpkg
        run: cargo install cargo-vcpkg

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/vcpkg
          key: vcpkg-${{ matrix.target }}-${{ hashFiles('Cargo.toml') }}
          restore-keys: vcpkg-${{ matrix.target }}-

      - name: Clear vcpkg cache (Windows)
        if: runner.os == 'Windows'
        run: Remove-Item -Recurse -Force target/vcpkg -ErrorAction SilentlyContinue

      - name: Build vcpkg dependencies
        run: cargo vcpkg -v build --target ${{ matrix.target }}

      # --features ci-static activates sdl2/use-vcpkg so sdl2-sys uses the
      # vcpkg output instead of pkg-config. Locally you just run cargo build
      # normally and it uses your system SDL2 via pkg-config instead.
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --features ci-static

      # --- Package binary ---
      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} staging/
          cp -r src/assets staging/ 2>/dev/null || true
          cd staging && tar czf ../${{ matrix.artifact }}.tar.gz *

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" staging/
          if (Test-Path "src/assets") { Copy-Item -Recurse "src/assets" staging/ }
          Compress-Archive -Path staging/* -DestinationPath "${{ matrix.artifact }}.zip"

      # --- Upload artifact ---
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: ignore

  # --- Create a GitHub Release when a tag is pushed ---
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
