name: Build & Release

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [main, master]
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: pathmaker-linux-x86_64
            binary: pathmaker
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: pathmaker-windows-x86_64
            binary: pathmaker.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: pathmaker-macos-aarch64
            binary: pathmaker

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # --- Linux dependencies (vcpkg) ---
      - name: Set up vcpkg cache (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: ~/vcpkg/installed
          key: vcpkg-${{ matrix.target }}-sdl2
          restore-keys: vcpkg-${{ matrix.target }}-

      - name: Install Linux dependencies (vcpkg)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config curl zip unzip tar autoconf autoconf-archive automake libtool libltdl-dev
          cd ..
          git clone https://github.com/Microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics
          ./vcpkg/vcpkg install sdl2:x64-linux sdl2-ttf:x64-linux sdl2-image:x64-linux
          echo "VCPKG_ROOT=$PWD/vcpkg" >> $GITHUB_ENV
          echo "VCPKGRS_DYNAMIC=0" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$PWD/vcpkg/installed/x64-linux/lib/pkgconfig" >> $GITHUB_ENV

      # --- macOS dependencies ---
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install sdl2 sdl2_ttf pkg-config

      # --- Windows dependencies (vcpkg) ---
      - name: Set up vcpkg cache (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-${{ matrix.target }}-sdl2
          restore-keys: vcpkg-${{ matrix.target }}-

      - name: Install Windows dependencies (vcpkg)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install sdl2:x64-windows-static-md sdl2-ttf:x64-windows-static-md sdl2-image:x64-windows-static-md
          vcpkg integrate install
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "VCPKGRS_DYNAMIC=1" >> $env:GITHUB_ENV

      - name: Install pkg-config (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install pkgconfiglite -y
          echo "PKG_CONFIG_PATH=C:\vcpkg\installed\x64-windows-static-md\lib\pkgconfig" >> $env:GITHUB_ENV

      # --- Rust toolchain ---
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # --- Build ---
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          SDL2_LIB_DIR: C:\vcpkg\installed\x64-windows-static-md\lib
          SDL2_INCLUDE_DIR: C:\vcpkg\installed\x64-windows-static-md\include
        run: cargo build --release --target ${{ matrix.target }}

      # --- Package binary ---
      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} staging/
          cp -r src/assets staging/ 2>/dev/null || true
          cd staging && tar czf ../${{ matrix.artifact }}.tar.gz *

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" staging/
          if (Test-Path "src/assets") { Copy-Item -Recurse "src/assets" staging/ }
          Compress-Archive -Path staging/* -DestinationPath "${{ matrix.artifact }}.zip"

      # --- Upload artifact (always available for download) ---
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: ignore

  # --- Create a GitHub Release when a tag is pushed ---
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
