[package]
name = "game_ex"
version = "0.1.0"
edition = "2021"
description = "PathMaker - Interactive Pathfinding Visualization"
license = "MIT"

[[bin]]
name = "pathmaker"
path = "src/main.rs"

[dependencies]
walkdir = "2.5.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
rand = "0.9.2"
cap = "0.1"

[target.'cfg(not(target_os = "windows"))'.dependencies]
jemallocator = "0.5.4"
jemalloc-ctl = "0.5.4"

[dependencies.sdl2]
version = "0.38.0"
default-features = false
features = ["ttf","image", "static-link", "use-pkgconfig"]
